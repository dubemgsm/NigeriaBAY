<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>How to Use This Dashboard</title>
    <style>
        .usage-container {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 20px 0;
        }
        .usage-box {
            padding: 24px;
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        .usage-title {
            font-size: 18px;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 16px;
        }
        .usage-steps {
            padding-left: 20px;
            margin: 0;
        }
        .usage-step {
            font-size: 14px;
            color: #4a5568;
            line-height: 1.8;
            margin-bottom: 8px;
        }
        .usage-step:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <div class="usage-container">
        <div class="usage-box">
            <div class="usage-title">How to Use This Dashboard</div>
            <ol class="usage-steps">
                <li class="usage-step">Focus on red (high-risk) LGAs</li>
                <li class="usage-step">Identify LGAs with high IDP population</li>
                <li class="usage-step">Check areas with high school closure rates</li>
                <li class="usage-step">Prioritize these LGAs for intervention</li>
            </ol>
        </div>
    </div>
</body>
</html>
